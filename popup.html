<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ET Lab Filler</title>
  <style>
    :root {
      --primary: #0044CC;
      --primary-dark: #002D80;
      --accent: #00F2FF;
      --bg-gradient-top: #EAF4FC;
      --bg-gradient-bottom: #FFFFFF;
      --danger: #E53935;
      --danger-light: #FFEBEE;
      --danger-dark: #B71C1C;
      --warning-bg: #FFF8E1;
      --warning-text: #F57F17;
      --text-main: #333333;
      --radius: 10px;
    }

    body { 
      width: 320px; 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: linear-gradient(145deg, var(--bg-gradient-top), var(--bg-gradient-bottom)); 
      position: relative;
      color: var(--text-main);
      user-select: none;
    }
    
    /* Info Button */
    .info-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 28px;
      height: 28px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--primary);
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
    }
    .info-btn:hover {
      background: var(--primary);
      color: #FFFFFF;
      transform: scale(1.1) rotate(5deg);
    }

    /* Header Section */
    .robot-header { 
      background: transparent; 
      text-align: center; 
      padding: 20px 0 10px; 
    }
    .robot-header img { 
      width: 90px; 
      height: 90px;
      border-radius: 50%;
      box-shadow: 0 6px 16px rgba(0, 68, 204, 0.15);
      border: 3px solid #FFFFFF;
      background: #FFFFFF;
      object-fit: cover;
    }
    
    .title-banner { 
      text-align: center; 
      padding: 0 0 15px; 
      font-size: 18px; 
      font-weight: 800; 
      color: var(--primary-dark);
      letter-spacing: 1px; 
    }

    /* Status Notice */
    .helper-notice {
      background: var(--warning-bg);
      color: var(--warning-text);
      font-size: 12px;
      text-align: center;
      padding: 10px 15px;
      font-weight: 600;
      border-top: 1px solid rgba(245, 127, 23, 0.2);
      border-bottom: 1px solid rgba(245, 127, 23, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* Main Content */
    .content { 
      padding: 15px 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 5px;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    /* Buttons */
    button { 
      border: none;
      border-radius: var(--radius); 
      padding: 12px; 
      font-weight: 600; 
      font-size: 13px; 
      cursor: pointer; 
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:active {
      transform: scale(0.98);
    }

    /* Standard Buttons */
    .btn-standard {
      background: #FFFFFF; 
      color: var(--primary); 
      border: 1.5px solid var(--primary);
      box-shadow: 0 2px 4px rgba(0, 68, 204, 0.05);
    }
    .btn-standard:hover { 
      background: #F0F4F8; 
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(0, 68, 204, 0.1);
    }

    /* Auto Buttons */
    .btn-auto {
      background: var(--primary); 
      color: #FFFFFF; 
      box-shadow: 0 4px 10px rgba(0, 68, 204, 0.2);
    }
    .btn-auto:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 68, 204, 0.3);
    }

    /* Danger Buttons */
    .btn-danger-outline {
      background: #FFFFFF;
      color: var(--danger);
      border: 1.5px solid var(--danger);
    }
    .btn-danger-outline:hover {
      background: var(--danger-light);
    }
    .btn-danger-filled {
      background: var(--danger);
      color: #FFFFFF;
    }
    .btn-danger-filled:hover {
      background: var(--danger-dark);
    }

    /* Stop Button */
    #btn-stop {
      background: var(--danger-dark); 
      color: #FFFFFF; 
      display: none;
      margin-top: 5px;
      font-weight: 700;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(183, 28, 28, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(183, 28, 28, 0); }
      100% { box-shadow: 0 0 0 0 rgba(183, 28, 28, 0); }
    }

    /* Footer */
    .footer { 
      background: var(--primary-dark); 
      color: #FFFFFF; 
      padding: 16px 20px; 
      font-weight: 600; 
      font-size: 13px; 
      display: flex;
      justify-content: space-between; 
      align-items: center;
      border-top: 4px solid var(--accent);
    }
    #count { 
      color: var(--accent); 
      font-size: 18px; 
      font-weight: 800; 
      background: rgba(0, 242, 255, 0.1);
      padding: 2px 10px;
      border-radius: 12px;
    }
    
    #error-msg {
      color: var(--danger-dark); 
      text-align: center; 
      font-size: 13px; 
      font-weight: 600;
      display: none; 
      background: var(--danger-light); 
      padding: 10px; 
      border-radius: var(--radius);
      border-left: 4px solid var(--danger);
    }
  </style>
</head>
<body>

  <a href="https://samuelmdileep.github.io/etlab_filler" target="_blank" class="info-btn" title="About & Privacy">?</a>

  <div class="robot-header">
    <img src="icon.png" alt="Assistant Mascot">
  </div>
  
  <div class="title-banner">ET LAB FILLER</div>

  <div class="helper-notice" id="helper-notice">
    <span>📍</span> Open an ETLab Appraisal page to begin.
  </div>
  
  <div class="content" id="action-content">
    
    <div class="section-title">📄 Current Page Only</div>
    <button id="btn-page-top" class="btn-standard">⭐ Fill (Excellent)</button>
    <button id="btn-page-random" class="btn-standard">📊 Fill (Realistic)</button>
    <button id="btn-page-worst" class="btn-danger-outline">⚠️ Fill (Worst)</button>
    
    <div class="section-title" style="margin-top: 5px;">🚀 Full Autopilot Mode</div>
    <button id="btn-auto-top" class="btn-auto">⚡ Auto-Complete (Excellent)</button>
    <button id="btn-auto-random" class="btn-auto">🔄 Auto-Complete (Realistic)</button>
    <button id="btn-auto-worst" class="btn-danger-filled">🚨 Auto-Complete (Worst)</button>
    
  </div>

  <div class="content" style="padding-top: 0;">
    <button id="btn-stop">🛑 STOP AUTOPILOT</button>
    <div id="error-msg">❌ Action could not be completed</div>
  </div>
  
  <div class="footer">
    <span>QUESTIONS FILLED</span>
    <span id="count">0</span>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
